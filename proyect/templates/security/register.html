{% extends "security/base.html" %}

{% block content %}
<div class="card-glass">
    <h2 class="card-title">Crear Cuenta</h2>
    <p class="card-subtitle">Completa los datos para registrarte</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="alert-danger"><i class="fas fa-exclamation-circle"></i> {{ messages[0] }}. Ir a <a href="{{ url_for('auth.login') }}" style="color:#fca5a5;">login</a>.</div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="/security/register">
        <div class="field">
            <label>Nombre completo</label>
            <input type="text" name="name" placeholder="Tu nombre" autofocus required>
        </div>
        <div class="field">
            <label>Correo electrónico</label>
            <input type="email" name="email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="field">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary"><i class="fas fa-user-plus"></i> Registrarse</button>
    </form>
    <div class="form-link">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a></div>
</div>
{% endblock %}
